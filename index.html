<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumo Gaming Hub</title>
    <style>
        :root {
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.6);
            --bg-dark: #0d0d14;
            --card-bg: rgba(28, 29, 41, 0.8);
            --text-main: #eee;
            --text-muted: #bbb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(13, 13, 20, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.loading { background: #ffa500; animation: pulse 1s infinite; }
        .status-dot.success { background: #00ff00; }
        .status-dot.error { background: #ff0000; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .admin-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .admin-btn:hover { background: var(--primary); color: #fff; }

        /* --- Main Content --- */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .refresh-btn:hover { background: #6a1bb5; }

        /* --- Game Grid --- */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(138, 43, 226, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--primary-glow);
            border-color: var(--primary);
        }

        .game-thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: #222;
        }

        .game-info { padding: 1rem; }
        .game-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; }
        .game-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }
        .game-category {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(138, 43, 226, 0.8);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* --- Game Frame --- */
        #game-frame-container {
            display: none;
            width: 100%;
            height: 70vh;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(138,43,226,0.3);
            position: relative;
            background: #000;
        }
        
        #game-frame-container.fullscreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999;
            border-radius: 0; margin: 0;
        }

        #game-frame { width: 100%; height: 100%; border: none; display: block; }

        .fullscreen-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(138, 43, 226, 0.8); border: none; color: #fff;
            padding: 10px 15px; border-radius: 8px; cursor: pointer; z-index: 1000;
            display: flex; align-items: center; gap: 5px;
        }
        .fullscreen-btn:hover { background: var(--primary); }
        
        .exit-fullscreen-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255, 69, 69, 0.8); border: none; color: #fff;
            padding: 10px 15px; border-radius: 8px; cursor: pointer; z-index: 1001;
            display: none;
        }
        #game-frame-container.fullscreen .exit-fullscreen-btn { display: flex; }
        #game-frame-container.fullscreen .fullscreen-btn { display: none; }

        /* --- Loading State --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 13, 20, 0.95);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(138, 43, 226, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            margin-top: 20px;
            color: var(--text-muted);
        }

        /* --- Notification --- */
        #notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 3000;
            display: none;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Loading games from GitHub...</p>
    </div>

    <header>
        <div class="logo">Lumo Gaming Hub</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
            <button class="admin-btn" onclick="openGitHubLink()">🔗 GitHub</button>
        </div>
    </header>

    <main>
        <h2 class="section-title">
            🎮 Available Games
            <button class="refresh-btn" onclick="refreshGames()">🔄 Refresh</button>
        </h2>
        <div class="games-grid" id="games-grid">
            <!-- Games will be injected here by JS -->
        </div>
        
        <div id="game-frame-container">
            <button class="fullscreen-btn" onclick="toggleGameFullscreen()">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                Fullscreen
            </button>
            <button class="exit-fullscreen-btn" onclick="exitGameFullscreen()">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                Exit
            </button>
            <iframe id="game-frame" src="" allowfullscreen></iframe>
        </div>
    </main>

    <!-- Notification -->
    <div id="notification"></div>

    <script>
        // ================= CONFIGURATION =================
        // Replace with YOUR GitHub username and repo name
        const GITHUB_USERNAME = 'your-username';
        const GITHUB_REPO = 'lumo-games-db';
        const GITHUB_BRANCH = 'main';
        const GITHUB_FILE = 'games-data.json';
        // =================================================

        // Construct the raw GitHub URL
        const GAMES_API_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/${GITHUB_BRANCH}/${GITHUB_FILE}`;

        let games = [];

        // Load games from GitHub on startup
        async function loadGamesFromGitHub() {
            const loadingOverlay = document.getElementById('loading-overlay');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            statusDot.className = 'status-dot loading';
            statusText.textContent = 'Fetching from GitHub...';

            try {
                const response = await fetch(GAMES_API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (data.games && Array.isArray(data.games)) {
                    games = data.games;
                    renderGames();
                    
                    statusDot.className = 'status-dot success';
                    statusText.textContent = `${games.length} games loaded`;
                    
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                    
                    showNotification(`✅ Loaded ${games.length} games from GitHub`);
                } else {
                    throw new Error('Invalid data format');
                }
            } catch (error) {
                console.error('Error loading games:', error);
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Connection failed';
                
                // Fallback to cached/local games if available
                const cached = localStorage.getItem('lumoGamesCache');
                if (cached) {
                    games = JSON.parse(cached);
                    renderGames();
                    loadingOverlay.style.display = 'none';
                    showNotification('⚠️ Using cached games (GitHub unavailable)', 'warning');
                } else {
                    loadingOverlay.innerHTML = `
                        <div style="color: #ff0000; text-align: center;">
                            <h2>❌ Failed to load games</h2>
                            <p>${error.message}</p>
                            <p style="margin-top: 15px;">Check your GitHub configuration:</p>
                            <code style="background: #222; padding: 10px; display: block; margin: 10px 0;">${GAMES_API_URL}</code>
                            <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; background: var(--primary); color: #fff; border: none; border-radius: 5px; cursor: pointer;">Retry</button>
                        </div>
                    `;
                }
            }
        }

        function renderGames() {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = '';

            if (games.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center;">No games available. Add games to your GitHub repository!</p>';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    ${game.category ? `<span class="game-category">${game.category}</span>` : ''}
                    <img src="${game.thumbnail || 'https://via.placeholder.com/220x140?text=No+Image'}" 
                         alt="${game.title}" class="game-thumb" 
                         onerror="this.src='https://via.placeholder.com/220x140?text=No+Image'">
                    <div class="game-info">
                        <div class="game-title">${game.title}</div>
                        <div class="game-desc">${game.description || 'No description'}</div>
                    </div>
                `;
                card.onclick = () => loadGame(game.url);
                grid.appendChild(card);
            });
        }

        function loadGame(url) {
            const container = document.getElementById('game-frame-container');
            const frame = document.getElementById('game-frame');
            frame.src = url;
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth' });
        }

        function refreshGames() {
            showNotification('🔄 Refreshing games...');
            loadGamesFromGitHub();
        }

        function openGitHubLink() {
            const githubUrl = `https://github.com/${GITHUB_USERNAME}/${GITHUB_REPO}`;
            window.open(githubUrl, '_blank');
        }

        // ================= FULLSCREEN =================
        function toggleGameFullscreen() {
            const container = document.getElementById('game-frame-container');
            container.classList.toggle('fullscreen');
            
            if (container.classList.contains('fullscreen')) {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                else if (container.msRequestFullscreen) container.msRequestFullscreen();
            }
        }

        function exitGameFullscreen() {
            const container = document.getElementById('game-frame-container');
            container.classList.remove('fullscreen');
            
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
        }

        document.addEventListener('fullscreenchange', () => {
            const container = document.getElementById('game-frame-container');
            if (!document.fullscreenElement && container.classList.contains('fullscreen')) {
                container.classList.remove('fullscreen');
            }
        });

        // ================= NOTIFICATIONS =================
        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.background = type === 'error' ? '#c00' : type === 'warning' ? '#ffa500' : 'var(--primary)';
            notif.style.display = 'block';
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }

        // Initialize
        loadGamesFromGitHub();
    </script>
</body>
</html>
