<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumo Gaming Hub & Proxy</title>
    <style>
        :root {
            /* Default Theme Variables (will be overridden by JS) */
            --bg-color: linear-gradient(145deg, #010310, #080c17);
            --card-bg: #0a0e1a;
            --text-main: #e0f2fe;
            --text-muted: #bae6fd;
            --accent: #3b82f6;
            --accent-light: #93c5fd;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --border: rgba(59, 130, 246, 0.3);
            --primary: #01031d;
            --secondary: #0a0e1a;
            --active-tab: linear-gradient(145deg, #1e3a8a, var(--secondary));
            --hover-danger: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* Header & Proxy Bar */
        header {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
        
        .proxy-container {
            flex-grow: 1;
            margin: 0 2rem;
            display: flex;
            gap: 10px;
        }

        input[type="url"] {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--primary);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="url"]:focus { border-color: var(--accent); }

        button {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: var(--secondary);
            color: var(--text-main);
            transition: all 0.2s;
        }

        .btn-go { background-color: var(--accent); color: white; border: none; }
        .btn-go:hover { background-color: var(--accent-light); color: var(--primary); }
        
        .btn-clear { background-color: var(--secondary); }
        .btn-clear:hover { background-color: var(--border); }

        /* Theme Selector Styles */
        .theme-selector {
            position: absolute;
            top: 60px;
            right: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            width: 250px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 12px 24px var(--accent-glow);
            z-index: 200;
        }

        .theme-selector.active { display: block; }

        .theme-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .theme-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
            position: relative;
            overflow: hidden;
        }

        .theme-item:hover {
            background: var(--active-tab);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .theme-color-strip {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            margin-right: 10px;
            border: 1px solid var(--border);
        }

        .theme-name { font-size: 0.9rem; font-weight: 500; }

        /* Main Layout */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar (Game List) */
        aside {
            width: 250px;
            background-color: var(--card-bg);
            padding: 1rem;
            overflow-y: auto;
            border-right: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }
        .section-title:first-child { margin-top: 0; }

        .game-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }

        .game-item:hover { background-color: var(--secondary); }
        .game-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 6px; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--primary); font-weight: bold;}

        /* Content Area */
        #content-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }

        /* Game Grid View */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .card-img {
            height: 120px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 2rem;
            font-weight: bold;
        }

        .card-body { padding: 1rem; }
        .card-title { font-weight: bold; margin-bottom: 0.5rem; color: var(--text-main); }
        .card-desc { font-size: 0.85rem; color: var(--text-muted); }

        /* Proxy View (Iframe) */
        .proxy-frame-container {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            display: none; /* Hidden by default */
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Status Bar */
        footer {
            padding: 0.5rem 2rem;
            background: var(--primary);
            color: var(--text-muted);
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            aside { width: 100%; height: auto; max-height: 200px; }
            .proxy-container { display: none; } 
            .theme-selector { right: 0; width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">LUMO HUB</div>
    <div class="proxy-container">
        <input type="url" id="proxy-url" placeholder="Enter website URL (e.g., https://example.com)" value="">
        <button class="btn-go" onclick="loadProxy()">Go</button>
        <button class="btn-clear" onclick="resetView()">Hub</button>
        <button id="theme-btn" onclick="toggleThemeSelector()" style="margin-left: 10px;">🎨</button>
    </div>
</header>

<!-- Theme Selector Dropdown -->
<div id="theme-selector" class="theme-selector">
    <div class="theme-title">Select Theme</div>
    <div id="themes-container"></div>
</div>

<main>
    <aside>
        <div class="section-title">Popular Games</div>
        <div class="game-item" onclick="launchGame('Minecraft Classic')">
            <div class="game-icon">MC</div>
            <span>Minecraft Classic</span>
        </div>
        <div class="game-item" onclick="launchGame('Agar.io')">
            <div class="game-icon">AG</div>
            <span>Agar.io</span>
        </div>
        <div class="game-item" onclick="launchGame('Slither.io')">
            <div class="game-icon">SL</div>
            <span>Slither.io</span>
        </div>
        
        <div class="section-title">Tools</div>
        <div class="game-item" onclick="alert('Settings coming soon!')">
            <div class="game-icon">⚙️</div>
            <span>Settings</span>
        </div>
    </aside>

    <div id="content-area">
        <!-- Game Grid View -->
        <div id="grid-view" class="game-grid">
            <!-- Cards injected via JS -->
        </div>

        <!-- Proxy View -->
        <div id="proxy-view" class="proxy-frame-container">
            <iframe id="proxy-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
    </div>
</main>

<footer>
    <div><span class="status-dot"></span>System Online</div>
    <div>Lumo Gaming Hub v1.0</div>
</footer>

<script>
    // --- Embedded Themes Data (from themes.json) ---
    const themesData = [
        {
            "name": "Default",
            "value": "default",
            "css": {
                "background": "linear-gradient(145deg, #010310, #080c17)",
                "primary": "#01031d",
                "secondary": "#0a0e1a",
                "accent": "#3b82f6",
                "accent-light": "#93c5fd",
                "accent-glow": "rgba(59, 130, 246, 0.2)",
                "border": "rgba(59, 130, 246, 0.3)",
                "text": "#e0f2fe",
                "text-muted": "#bae6fd",
                "active-tab": "linear-gradient(145deg, #1e3a8a, var(--secondary))"
            }
        },
        {
            "name": "Shadow",
            "value": "shadow",
            "css": {
                "background": "linear-gradient(145deg, #0b0013, #15001f)",
                "primary": "#12001f",
                "secondary": "#1a0a2b",
                "accent": "#a855f7",
                "accent-light": "#d8b4fe",
                "accent-glow": "rgba(168, 85, 247, 0.2)",
                "border": "rgba(168, 85, 247, 0.3)",
                "text": "#f3e8ff",
                "text-muted": "#e9d5ff",
                "active-tab": "linear-gradient(145deg, #6b21a8, var(--secondary))"
            }
        },
        {
            "name": "Midnight City",
            "value": "midnight",
            "css": {
                "background": "#0a0a0f",
                "primary": "#111322",
                "secondary": "#1a1c2b",
                "accent": "#4f46e5",
                "accent-light": "#818cf8",
                "accent-glow": "rgba(99, 102, 241, 0.2)",
                "border": "rgba(129, 140, 248, 0.25)",
                "text": "#f1f5f9",
                "text-muted": "#cbd5e1",
                "active-tab": "linear-gradient(145deg, #4338ca, var(--secondary))"
            }
        },
        {
            "name": "Red Sunset",
            "value": "redsunset",
            "css": {
                "background": "linear-gradient(145deg, #2b001b, #490000)",
                "primary": "#2e020e",
                "secondary": "#450202",
                "accent": "#ef4444",
                "accent-light": "#f87171",
                "accent-glow": "rgba(239, 68, 68, 0.2)",
                "border": "rgba(239, 68, 68, 0.3)",
                "text": "#fef2f2",
                "text-muted": "#fee2e2",
                "active-tab": "linear-gradient(145deg, #ef4444, var(--secondary))"
            }
        },
        {
            "name": "Matrix",
            "value": "matrix",
            "css": {
                "background": "linear-gradient(145deg, #000c05, #001a0f)",
                "primary": "#001a0f",
                "secondary": "#003b22",
                "accent": "#39ff14",
                "accent-light": "#66ff66",
                "accent-glow": "rgba(57, 255, 20, 0.25)",
                "border": "rgba(57, 255, 20, 0.3)",
                "text": "#eaffea",
                "text-muted": "#c6fdd1",
                "active-tab": "linear-gradient(145deg, #39ff14, var(--secondary))"
            }
        },
        {
            "name": "Opera GX",
            "value": "operagx",
            "css": {
                "background": "linear-gradient(145deg, #0d0606, #040000)",
                "primary": "#090505",
                "secondary": "#000",
                "accent": "#ff0050",
                "accent-light": "#ff4f87",
                "accent-glow": "rgba(255, 0, 80, 0.15)",
                "border": "rgba(255, 0, 80, 0.25)",
                "text": "#f0f0f5",
                "text-muted": "#a0a0b2",
                "active-tab": "linear-gradient(145deg, #ff0050, #1a1b22)"
            }
        },
        {
            "name": "Metallic Brass",
            "value": "golden",
            "css": {
                "background": "linear-gradient(145deg, #1a1200, #2d1f00)",
                "primary": "#2d1f00",
                "secondary": "#3d2f10",
                "accent": "#ffd700",
                "accent-light": "#ffed4e",
                "accent-glow": "rgba(255, 215, 0, 0.2)",
                "border": "rgba(255, 215, 0, 0.3)",
                "text": "#fffacd",
                "text-muted": "#f0e68c",
                "active-tab": "linear-gradient(145deg, #b8860b, var(--secondary))"
            }
        },
        {
            "name": "Kay's Pink",
            "value": "kayspink",
            "css": {
                "background": "linear-gradient(145deg, #0a0012, #17001c)",
                "primary": "#120016",
                "secondary": "#1a001f",
                "accent": "#ff0090",
                "accent-light": "#ff7bc6",
                "accent-glow": "rgba(255, 0, 144, 0.2)",
                "border": "rgba(255, 0, 144, 0.3)",
                "text": "#ffe4f3",
                "text-muted": "#ffb8dc",
                "active-tab": "linear-gradient(145deg, #8a005e, var(--secondary))"
            }
        }
    ];

    // --- Mock Game Data ---
    const games = [
        { id: 1, title: "Minecraft Classic", desc: "Build and explore.", url: "https://classic.minecraft.net" },
        { id: 2, title: "Agar.io", desc: "Eat cells smaller than you.", url: "https://agar.io" },
        { id: 3, title: "Slither.io", desc: "Grow your snake.", url: "https://slither.io" },
        { id: 4, title: "2048", desc: "Combine numbers to win.", url: "https://play2048.co" },
        { id: 5, title: "Hextris", desc: "Fast-paced puzzle game.", url: "https://hextris.io" },
        { id: 6, title: "Pacman", desc: "Classic arcade fun.", url: "https://pacman-e6a.pages.dev" }
    ];

    const gridView = document.getElementById('grid-view');
    const proxyView = document.getElementById('proxy-view');
    const proxyFrame = document.getElementById('proxy-frame');
    const urlInput = document.getElementById('proxy-url');
    const themeBtn = document.getElementById('theme-btn');
    const themeSelector = document.getElementById('theme-selector');
    const themesContainer = document.getElementById('themes-container');

    // --- Theme Logic (Adapted from script.js) ---
    function applyTheme(theme) {
        const root = document.documentElement;
        const css = theme.css;
        
        root.style.setProperty('--bg-color', css.background);
        root.style.setProperty('--card-bg', css.secondary); // Using secondary for cards
        root.style.setProperty('--text-main', css.text);
        root.style.setProperty('--text-muted', css['text-muted']);
        root.style.setProperty('--accent', css.accent);
        root.style.setProperty('--accent-light', css['accent-light']);
        root.style.setProperty('--accent-glow', css['accent-glow']);
        root.style.setProperty('--border', css.border);
        root.style.setProperty('--primary', css.primary);
        root.style.setProperty('--secondary', css.secondary);
        root.style.setProperty('--active-tab', css['active-tab']);
    }

    function toggleThemeSelector() {
        themeSelector.classList.toggle('active');
    }

    // Close theme selector when clicking outside
    document.addEventListener('click', (e) => {
        if (!themeSelector.contains(e.target) && e.target !== themeBtn) {
            themeSelector.classList.remove('active');
        }
    });

    function initThemes() {
        themesContainer.innerHTML = '';
        themesData.forEach(theme => {
            const themeDiv = document.createElement('div');
            themeDiv.classList.add('theme-item');
            themeDiv.onclick = () => {
                applyTheme(theme);
                themeSelector.classList.remove('active');
            };

            // Color Strip
            const colorDiv = document.createElement('div');
            colorDiv.classList.add('theme-color-strip');
            colorDiv.style.background = `linear-gradient(135deg, ${theme.css['primary']}, ${theme.css['secondary']}, ${theme.css['accent']}, ${theme.css['accent-light']})`;
            colorDiv.style.borderColor = theme.css['accent-light'];

            // Name
            const nameSpan = document.createElement('span');
            nameSpan.classList.add('theme-name');
            nameSpan.textContent = theme.name;

            themeDiv.appendChild(colorDiv);
            themeDiv.appendChild(nameSpan);
            themesContainer.appendChild(themeDiv);
        });
    }

    // --- Game & Proxy Logic ---
    function initGrid() {
        gridView.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => launchGame(game.title);
            card.innerHTML = `
                <div class="card-img">${game.title.substring(0,2)}</div>
                <div class="card-body">
                    <div class="card-title">${game.title}</div>
                    <div class="card-desc">${game.desc}</div>
                </div>
            `;
            gridView.appendChild(card);
        });
    }

    function loadProxy() {
        let url = urlInput.value.trim();
        if (!url) {
            alert("Please enter a URL");
            return;
        }
        if (!url.startsWith('http')) {
            url = 'https://' + url;
        }

        // NOTE: For a real proxy, prepend your backend URL here
        // const finalUrl = `http://127.0.0.1:8080/?url=${encodeURIComponent(url)}`;
        const finalUrl = url; 

        gridView.style.display = 'none';
        proxyView.style.display = 'block';
        proxyFrame.src = finalUrl;
        
        document.querySelector('.status-dot').style.backgroundColor = '#3b82f6';
    }

    function launchGame(gameTitle) {
        const game = games.find(g => g.title === gameTitle);
        if (game) {
            urlInput.value = game.url;
            loadProxy();
        }
    }

    function resetView() {
        proxyFrame.src = '';
        proxyView.style.display = 'none';
        gridView.style.display = 'grid';
        urlInput.value = '';
        document.querySelector('.status-dot').style.backgroundColor = '#22c55e';
    }

    // Initialize
    initGrid();
    initThemes();
    applyTheme(themesData[0]); // Apply default theme
</script>

</body>
</html>
